name: Diario Google Workspace

on:
  schedule:
    # 13:00 UTC = 07:00 en Ciudad de México (UTC-6, sin horario de verano)
    - cron: "0 13 * * *"
  workflow_dispatch: {}   # permite ejecutarlo a mano desde la pestaña Actions
  push:
    branches: [ main ]    # genera la página en el primer push

permissions:
  contents: write

concurrency:
  group: diario
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generar portal
        run: node scripts/generate.mjs

      - name: Publicar cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Sin cambios hoy."
          else
            git commit -m "Diario Google Workspace: $(date -u +%Y-%m-%d)"
            git push
          fi
